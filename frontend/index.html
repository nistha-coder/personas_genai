<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona-Based AI Chatbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Persona-Based AI Chatbot</h1>
        <p class="subtitle">Prompt Engineering Assignment</p>
        <p class="active-persona">
          Active Persona:
          <span id="activePersonaLabel">Anshuman Singh</span>
        </p>
      </header>

      <section class="persona-switcher" aria-label="Persona switcher">
        <button class="persona-btn active" data-persona="anshuman">Anshuman Singh</button>
        <button class="persona-btn" data-persona="abhimanyu">Abhimanyu Saxena</button>
        <button class="persona-btn" data-persona="kshitij">Kshitij Mishra</button>
      </section>

      <section class="suggestions">
        <p class="suggestions-title">Quick start questions</p>
        <div id="suggestionChips" class="chips" aria-live="polite"></div>
      </section>

      <section id="chatBox" class="chat-box" aria-live="polite"></section>

      <div id="typingIndicator" class="typing hidden">Persona is thinking...</div>

      <form id="chatForm" class="input-area">
        <input
          id="userInput"
          type="text"
          placeholder="Ask your question..."
          autocomplete="off"
          required
        />
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
</html>
